<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00d2ff;
            --accent-2: #3a7bd5;
            --bg: #050a18;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e6ed;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at 50% 0%, #1a2a4a 0%, #050a18 70%);
            height: 100vh; overflow: hidden;
        }

        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .glass {
            background: var(--card); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .main-app {
            display: grid; grid-template-columns: 80px 1fr 350px;
            height: 100vh; padding: 20px; gap: 20px;
        }

        .sidebar {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; gap: 30px;
        }
        .nav-item {
            width: 50px; height: 50px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; border-radius: 15px;
            font-size: 20px; color: var(--text); opacity: 0.5;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            opacity: 1; background: var(--accent); color: #000;
            box-shadow: 0 0 15px var(--accent);
        }

        .content-scroll {
            overflow-y: auto; padding-right: 10px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .content-scroll::-webkit-scrollbar { width: 6px; }
        .content-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .post {
            padding: 20px; margin-bottom: 20px;
            animation: slideIn 0.5s ease-out forwards;
        }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .post-img { width: 100%; border-radius: 15px; margin-top: 15px; }

        #callOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; padding: 40px; flex-direction: column;
        }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; }
        video {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 30px; border: 1px solid var(--accent); background: #111;
        }
        .call-controls { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .circle-btn {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center;
        }
        .btn-end { background: #ff3b30; color: white; }

        .input-group {
            background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 16px; resize: none; height: 80px;
        }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">FLUXO OS BOOTING...</p>
    </div>

    <div id="auth" style="position: fixed; inset: 0; z-index: 8000; display: flex; align-items: center; justify-content: center; background: var(--bg);">
        <div class="glass" style="width: 400px; padding: 40px; text-align: center;">
            <i class="fa-solid fa-rocket" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Bem-vindo ao Fluxo</h2>
            <input type="text" id="username" placeholder="Teu @nome" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white; margin:20px 0;">
            <button onclick="bootApp()" style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--accent); color:#000; font-weight:bold; cursor:pointer;">INICIALIZAR</button>
        </div>
    </div>

    <div id="app" class="main-app hidden">
        <nav class="sidebar glass">
            <div class="nav-item active" onclick="showTab('feed', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="showTab('chat', this)"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="nav-item" onclick="showTab('call', this)"><i class="fa-solid fa-video"></i></div>
            <div style="margin-top: auto;">
                <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></div>
            </div>
        </nav>

        <main class="content-scroll">
            <header style="margin-bottom: 30px;">
                <h1 style="margin:0; font-weight: 800;">Fluxo <span style="color: var(--accent);">Feed</span></h1>
                <p id="peerIdDisplay" style="color: var(--accent); font-size: 12px; margin-top: 5px; cursor: pointer;"></p>
            </header>

            <section id="feed-tab" class="tab-content">
                <div class="glass input-group">
                    <textarea id="postContent" placeholder="Qual é a novidade?"></textarea>
                    <div class="action-bar">
                        <label for="imgInput" style="cursor:pointer; color: var(--accent);"><i class="fa-solid fa-camera"></i> Foto</label>
                        <input type="file" id="imgInput" class="hidden" accept="image/*">
                        <button onclick="publishPost()" style="background:var(--accent); border:none; padding:8px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">POST</button>
                    </div>
                </div>
                <div id="postsList"></div>
            </section>

            <section id="chat-tab" class="tab-content hidden">
                <div class="glass" style="height: 70vh; display: flex; flex-direction: column; padding: 20px;">
                    <div id="chatMessages" style="flex:1; overflow-y:auto; padding-bottom: 20px;"></div>
                    <div class="action-bar">
                        <input type="text" id="chatInput" placeholder="Mensagem local..." style="flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--border); padding:12px; border-radius:10px; color:white; margin-right:10px;">
                        <button onclick="sendMsg()" style="padding:12px; background:var(--accent); border:none; border-radius:10px; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <section id="call-tab" class="tab-content hidden">
                <div class="glass" style="padding: 40px; text-align: center;">
                    <h2>Chamada Encriptada</h2>
                    <p>Usa o ID de 5 dígitos do teu contacto.</p>
                    <input type="text" id="targetId" placeholder="Ex: X8K2L" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white; margin:20px 0; text-align:center; text-transform: uppercase;">
                    <button onclick="startCall()" style="width:100%; padding:20px; border-radius:15px; border:none; background:var(--accent); color:#000; font-weight:bold; cursor:pointer; font-size:18px;"><i class="fa-solid fa-phone"></i> LIGAR AGORA</button>
                </div>
            </section>
        </main>

        <aside class="sidebar-right">
            <div class="glass" style="padding: 20px; margin-bottom: 20px;">
                <h4 style="margin-top:0"><i class="fa-solid fa-circle-user"></i> O Teu Perfil</h4>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="avatar" id="myInitial">U</div>
                    <div>
                        <b id="myNameDisplay">@User</b><br>
                        <small style="color: var(--accent);">Online</small>
                    </div>
                </div>
            </div>
            <div class="glass" style="padding: 20px;">
                <h4>Atividade</h4>
                <div style="font-size: 13px; opacity: 0.7;">
                    <p>⚡ ID Curto Ativado.</p>
                    <p>🔒 Conexão P2P Pronta.</p>
                </div>
            </div>
        </aside>
    </div>

    <div id="callOverlay">
        <div class="video-grid">
            <video id="localVideo" autoplay muted></video>
            <video id="remoteVideo" autoplay></video>
        </div>
        <div class="call-controls">
            <button class="circle-btn btn-end" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <script>
        let peer;
        let myStream;
        let currentUser = "";
        let posts = JSON.parse(localStorage.getItem('fluxo_pro_posts')) || [];

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
            renderPosts();
        };

        function bootApp() {
            const user = document.getElementById('username').value.trim();
            if(!user) return alert("Insere um nome!");
            
            currentUser = user;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('myNameDisplay').innerText = "@" + user;
            document.getElementById('myInitial').innerText = user[0].toUpperCase();

            // GERAR ID DE 5 DIGITOS
            const shortId = Math.random().toString(36).substring(2, 7).toUpperCase();
            
            peer = new Peer(shortId);
            
            peer.on('open', (id) => {
                const display = document.getElementById('peerIdDisplay');
                display.innerText = "TEU ID: " + id + " (Clique para copiar)";
                display.onclick = () => {
                    navigator.clipboard.writeText(id);
                    alert("ID Copiado: " + id);
                };
            });

            peer.on('call', (call) => {
                if(confirm("Chamada recebida! Aceitar?")) {
                    navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                        myStream = stream;
                        document.getElementById('localVideo').srcObject = stream;
                        document.getElementById('callOverlay').style.display = 'flex';
                        call.answer(stream);
                        call.on('stream', rs => { document.getElementById('remoteVideo').srcObject = rs; });
                    });
                }
            });
        }

        function showTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.remove('hidden');
            el.classList.add('active');
        }

        function publishPost() {
            const content = document.getElementById('postContent').value;
            const imgFile = document.getElementById('imgInput').files[0];
            if(!content && !imgFile) return;

            const reader = new FileReader();
            if(imgFile) {
                reader.readAsDataURL(imgFile);
                reader.onload = () => savePost(content, reader.result);
            } else {
                savePost(content, null);
            }
        }

        function savePost(text, img) {
            const newPost = {
                u: currentUser,
                t: text,
                i: img,
                time: new Date().toLocaleTimeString()
            };
            
            try {
                posts.unshift(newPost);
                localStorage.setItem('fluxo_pro_posts', JSON.stringify(posts));
                document.getElementById('postContent').value = "";
                document.getElementById('imgInput').value = "";
                renderPosts();
            } catch(e) {
                alert("Erro: Imagem muito grande! Tenta uma foto menor.");
                posts.shift();
            }
        }

        function renderPosts() {
            const list = document.getElementById('postsList');
            list.innerHTML = posts.map(p => `
                <div class="glass post">
                    <div class="post-header">
                        <div class="avatar">${p.u[0].toUpperCase()}</div>
                        <div><b>@${p.u}</b><br><small style="opacity:0.5">${p.time}</small></div>
                    </div>
                    <p>${p.t}</p>
                    ${p.i ? `<img src="${p.i}" class="post-img">` : ''}
                </div>
            `).join('');
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            const msgHtml = `<p><b>Tu:</b> ${input.value}</p>`;
            document.getElementById('chatMessages').innerHTML += msgHtml;
            input.value = "";
        }

        async function startCall() {
            const targetId = document.getElementById('targetId').value.trim().toUpperCase();
            if(!targetId) return alert("ID inválido");
            try {
                myStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = myStream;
                document.getElementById('callOverlay').style.display = 'flex';
                const call = peer.call(targetId, myStream);
                call.on('stream', rs => { document.getElementById('remoteVideo').srcObject = rs; });
            } catch (err) { alert("Erro na câmara!"); }
        }

        function endCall() {
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            document.getElementById('callOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
