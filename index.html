<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo | Social Network</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050a18;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e6ed;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at 50% 0%, #1a2a4a 0%, #050a18 70%);
            height: 100vh; overflow: hidden;
        }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; }
        .hidden { display: none !important; }

        .main-app {
            display: grid; grid-template-columns: 80px 1fr 320px;
            height: 100vh; padding: 20px; gap: 20px;
        }

        .sidebar { display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .nav-item {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; font-size: 20px; opacity: 0.5; transition: 0.3s;
        }
        .nav-item.active { opacity: 1; background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .content-scroll { overflow-y: auto; padding-right: 10px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        
        .post { padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); animation: slideIn 0.3s ease-out; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 15px; max-height: 450px; object-fit: cover; }

        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; resize: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen" style="position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: flex; align-items: center; justify-content: center;">
        <div class="glass" style="width: 380px; padding: 40px; text-align: center;">
            <h1 style="color: var(--accent); letter-spacing: 3px;">FLUXO</h1>
            <div style="margin: 25px 0; cursor: pointer;" onclick="document.getElementById('avatarInput').click()">
                <img id="avatarPreview" src="https://ui-avatars.com/api/?name=User&background=00d2ff&color=000" style="width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover;">
                <p style="font-size: 13px; color: var(--accent); margin-top: 10px;">Escolher Foto</p>
            </div>
            <input type="file" id="avatarInput" class="hidden" accept="image/*">
            <input type="text" id="username" placeholder="Teu apelido...">
            <button class="btn" style="width: 100%; height: 50px;" onclick="bootApp()">ENTRAR NO FLUXO</button>
        </div>
    </div>

    <div id="app" class="main-app hidden">
        <nav class="sidebar glass">
            <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></div>
        </nav>

        <main class="content-scroll">
            <h2 style="margin: 0 0 20px 0;">O teu <span style="color:var(--accent)">Feed</span></h2>
            
            <div class="glass" style="padding: 20px; margin-bottom: 30px;">
                <textarea id="postTxt" rows="3" placeholder="O que estás a pensar hoje?"></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="cursor: pointer; color: var(--accent); font-weight: bold; font-size: 14px;">
                        <i class="fa-solid fa-image"></i> Adicionar Foto 
                        <input type="file" id="postImgInput" class="hidden" accept="image/*">
                    </label>
                    <button class="btn" onclick="publishPost()">Publicar</button>
                </div>
            </div>

            <div id="feedArea"></div>
        </main>

        <aside>
            <div class="glass" style="padding: 25px; text-align: center;">
                <img id="myAvatarSide" class="avatar-circle" style="width: 90px; height: 90px; margin-bottom: 15px;">
                <h3 id="myNameSide" style="margin: 0;"></h3>
                <p style="color: var(--accent); font-size: 12px; margin-top: 5px;">Membro Ativo</p>
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
                <div style="text-align: left; font-size: 13px; opacity: 0.7;">
                    <p><i class="fa-solid fa-check" style="color: var(--accent)"></i> Sessão Segura</p>
                    <p><i class="fa-solid fa-check" style="color: var(--accent)"></i> Armazenamento Local</p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let userData = { nome: "", foto: "" };
        let posts = JSON.parse(localStorage.getItem('fluxo_v3_data')) || [];

        // Preview de Avatar
        document.getElementById('avatarInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('avatarPreview').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function bootApp() {
            const nome = document.getElementById('username').value.trim();
            if(!nome) return alert("Diz-nos o teu nome!");

            userData.nome = nome;
            userData.foto = document.getElementById('avatarPreview').src;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            document.getElementById('myNameSide').innerText = nome;
            document.getElementById('myAvatarSide').src = userData.foto;
            
            renderPosts();
        }

        function publishPost() {
            const txt = document.getElementById('postTxt').value.trim();
            const imgFile = document.getElementById('postImgInput').files[0];
            
            if(!txt && !imgFile) return;

            const save = (imgData = null) => {
                const newPost = {
                    u: userData.nome,
                    f: userData.foto,
                    t: txt,
                    i: imgData,
                    h: new Date().toLocaleString('pt-PT', { hour: '2-digit', minute: '2-digit' })
                };

                posts.unshift(newPost);
                
                // Limitar a 20 posts para não sobrecarregar o browser
                if(posts.length > 20) posts.pop();

                localStorage.setItem('fluxo_v3_data', JSON.stringify(posts));
                
                // Reset campos
                document.getElementById('postTxt').value = "";
                document.getElementById('postImgInput').value = "";
                renderPosts();
            };

            if(imgFile) {
                const reader = new FileReader();
                reader.onload = () => save(reader.result);
                reader.readAsDataURL(imgFile);
            } else {
                save();
            }
        }

        function renderPosts() {
            const area = document.getElementById('feedArea');
            if(posts.length === 0) {
                area.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px;">Ainda não há nada por aqui. Sê o primeiro a publicar!</p>';
                return;
            }

            area.innerHTML = posts.map(p => `
                <div class="glass post">
                    <div class="post-header">
                        <img src="${p.f}" class="avatar-circle">
                        <div>
                            <div style="font-weight:bold">${p.u}</div>
                            <div style="font-size:11px; opacity:0.5">${p.h}</div>
                        </div>
                    </div>
                    ${p.t ? `<p style="margin:15px 0 0 0; line-height:1.5;">${p.t}</p>` : ''}
                    ${p.i ? `<img src="${p.i}" class="post-img">` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
