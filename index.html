<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo | Social Sync</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050a18;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e6ed;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at 50% 0%, #1a2a4a 0%, #050a18 70%);
            height: 100vh; overflow: hidden;
        }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; }
        .hidden { display: none !important; }

        .main-app {
            display: grid; grid-template-columns: 80px 1fr 320px;
            height: 100vh; padding: 20px; gap: 20px;
        }

        .sidebar { display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .nav-item {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; font-size: 20px; opacity: 0.5; transition: 0.3s;
        }
        .nav-item.active { opacity: 1; background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .content-scroll { overflow-y: auto; padding-right: 10px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        
        .post { padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); animation: slideIn 0.3s ease-out; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 15px; max-height: 400px; object-fit: cover; }

        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; resize: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }

        /* Inbox Style */
        .msg-bubble { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 3px solid var(--accent); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen" style="position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: flex; align-items: center; justify-content: center;">
        <div class="glass" style="width: 380px; padding: 40px; text-align: center;">
            <h1 style="color: var(--accent); letter-spacing: 3px; margin-bottom: 5px;">FLUXO</h1>
            <p style="font-size: 12px; opacity: 0.6; margin-bottom: 30px;">Identidade Digital via E-mail</p>
            
            <input type="email" id="userEmail" placeholder="Teu e-mail profissional">
            <div id="firstTimeFields" class="hidden">
                <div style="margin: 20px 0; cursor: pointer;" onclick="document.getElementById('avatarInput').click()">
                    <img id="avatarPreview" src="https://ui-avatars.com/api/?background=00d2ff&color=000" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover;">
                </div>
                <input type="file" id="avatarInput" class="hidden" accept="image/*">
                <input type="text" id="username" placeholder="Nome de utilizador">
            </div>

            <button class="btn" style="width: 100%; height: 50px; margin-top: 10px;" onclick="handleAuth()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="app" class="main-app hidden">
        <nav class="sidebar glass">
            <div class="nav-item active" onclick="switchTab('feed', this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="switchTab('inbox', this)"><i class="fa-solid fa-envelope"></i></div>
            <div class="nav-item" onclick="logout()"><i class="fa-solid fa-power-off"></i></div>
        </nav>

        <main class="content-scroll">
            <section id="tab-feed">
                <h2 style="margin: 0 0 20px 0;">Feed <span style="color:var(--accent)">Global</span></h2>
                <div class="glass" style="padding: 20px; margin-bottom: 30px;">
                    <textarea id="postTxt" rows="2" placeholder="Partilha algo com a rede..."></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="cursor: pointer; color: var(--accent); font-size: 14px;"><i class="fa-solid fa-image"></i> Foto<input type="file" id="postImgInput" class="hidden" accept="image/*"></label>
                        <button class="btn" onclick="publishPost()">Publicar</button>
                    </div>
                </div>
                <div id="feedArea"></div>
            </section>

            <section id="tab-inbox" class="hidden">
                <h2 style="margin: 0 0 20px 0;">Mensagens <span style="color:var(--accent)">Privadas</span></h2>
                <div class="glass" style="padding: 20px; margin-bottom: 20px;">
                    <input type="email" id="msgDest" placeholder="E-mail do destinatário">
                    <textarea id="msgContent" rows="2" placeholder="Escreve a tua mensagem secreta..."></textarea>
                    <button class="btn" style="width: 100%" onclick="sendPrivateMsg()">ENVIAR MENSAGEM</button>
                </div>
                <div id="inboxArea"></div>
            </section>
        </main>

        <aside>
            <div class="glass" style="padding: 25px; text-align: center;">
                <img id="myAvatarSide" class="avatar-circle" style="width: 80px; height: 80px; margin-bottom: 10px;">
                <h3 id="myNameSide" style="margin: 0; font-size: 18px;"></h3>
                <small id="myEmailSide" style="color: var(--accent); opacity: 0.8;"></small>
                <div style="margin-top: 25px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; font-size: 12px;">
                    <b>Estatísticas:</b>
                    <p style="margin: 8px 0 0 0;">Publicações: <span id="countPosts" style="color:var(--accent)">0</span></p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let currentUser = null;
        let posts = JSON.parse(localStorage.getItem('fluxo_v4_posts')) || [];
        let messages = JSON.parse(localStorage.getItem('fluxo_v4_msgs')) || [];

        // Lógica de Login/E-mail
        function handleAuth() {
            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            if(!email) return alert("Insere o teu e-mail!");

            const storedUser = JSON.parse(localStorage.getItem('user_' + email));

            if(storedUser) {
                login(storedUser);
            } else {
                const firstTime = document.getElementById('firstTimeFields');
                if(firstTime.classList.contains('hidden')) {
                    firstTime.classList.remove('hidden');
                    alert("E-mail não encontrado. Cria o teu perfil!");
                } else {
                    const nome = document.getElementById('username').value.trim();
                    if(!nome) return alert("Escolhe um nome!");
                    
                    const newUser = {
                        email: email,
                        nome: nome,
                        foto: document.getElementById('avatarPreview').src
                    };
                    localStorage.setItem('user_' + email, JSON.stringify(newUser));
                    login(newUser);
                }
            }
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('myNameSide').innerText = user.nome;
            document.getElementById('myEmailSide').innerText = user.email;
            document.getElementById('myAvatarSide').src = user.foto;
            renderPosts();
            renderInbox();
        }

        function logout() { location.reload(); }

        // Mudar Abas
        function switchTab(tab, el) {
            document.getElementById('tab-feed').classList.toggle('hidden', tab !== 'feed');
            document.getElementById('tab-inbox').classList.toggle('hidden', tab !== 'inbox');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // Sistema de Feed
        function publishPost() {
            const txt = document.getElementById('postTxt').value;
            const imgFile = document.getElementById('postImgInput').files[0];
            if(!txt && !imgFile) return;

            const save = (imgData = null) => {
                posts.unshift({ u: currentUser.nome, f: currentUser.foto, t: txt, i: imgData, h: new Date().toLocaleTimeString() });
                localStorage.setItem('fluxo_v4_posts', JSON.stringify(posts));
                document.getElementById('postTxt').value = "";
                renderPosts();
            };

            if(imgFile) {
                const reader = new FileReader();
                reader.onload = () => save(reader.result);
                reader.readAsDataURL(imgFile);
            } else { save(); }
        }

        function renderPosts() {
            const area = document.getElementById('feedArea');
            document.getElementById('countPosts').innerText = posts.filter(p => p.u === currentUser.nome).length;
            area.innerHTML = posts.map(p => `
                <div class="glass post">
                    <div class="post-header"><img src="${p.f}" class="avatar-circle"><div><b>${p.u}</b><br><small style="opacity:0.4">${p.h}</small></div></div>
                    <p>${p.t}</p>${p.i ? `<img src="${p.i}" class="post-img">` : ''}
                </div>
            `).join('');
        }

        // Sistema de Mensagens Privadas
        function sendPrivateMsg() {
            const dest = document.getElementById('msgDest').value.trim().toLowerCase();
            const content = document.getElementById('msgContent').value.trim();
            if(!dest || !content) return alert("Preenche os campos!");

            messages.unshift({ from: currentUser.email, to: dest, text: content, date: new Date().toLocaleTimeString() });
            localStorage.setItem('fluxo_v4_msgs', JSON.stringify(messages));
            document.getElementById('msgContent').value = "";
            alert("Mensagem enviada para " + dest);
            renderInbox();
        }

        function renderInbox() {
            const area = document.getElementById('inboxArea');
            // Filtrar apenas mensagens enviadas PARA MIM ou POR MIM
            const myMsgs = messages.filter(m => m.to === currentUser.email || m.from === currentUser.email);
            
            area.innerHTML = myMsgs.map(m => `
                <div class="msg-bubble">
                    <small style="color:var(--accent)">${m.from === currentUser.email ? 'TU PARA ' + m.to : 'DE: ' + m.from}</small>
                    <p style="margin:5px 0;">${m.text}</p>
                    <small style="opacity:0.4; font-size:10px;">${m.date}</small>
                </div>
            `).join('');
        }

        // Preview foto
        document.getElementById('avatarInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('avatarPreview').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
